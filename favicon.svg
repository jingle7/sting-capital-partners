  <!-- wings -->
  <path d="M13.9 11.8 C9.2 10.4 5.2 11.8 3.9 14.6 C6.4 15.9 10.8 15.7 14 13.9" opacity="0.8"/>
  <path d="M18.1 11.8 C22.8 10.4 26.8 11.8 28.1 14.6 C25.6 15.9 21.2 15.7 18 13.9" opacity="0.8"/>
